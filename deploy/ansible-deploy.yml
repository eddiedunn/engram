---
# Deploy engram to tela (rootless, user-level Quadlet)
#
# Usage (run on tela as eddie with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e "engram_src_dir=<path>"
#
# Variables:
#   engram_src_dir: path to checked-out repo on tela (set by Jenkins as WORKSPACE)

- name: Deploy engram
  hosts: all
  gather_facts: false

  vars:
    service_name: engram
    quadlet_dir: /home/eddie/.config/containers/systemd
    engram_src_dir: "{{ ansible_env.HOME }}/engram"

  tasks:
    - name: Build container image from source
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/engram:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ engram_src_dir }}"
      changed_when: true
      notify: Reload and restart engram

    - name: Tag image for registry
      ansible.builtin.command:
        cmd: >
          podman tag
          localhost/engram:latest
          registry.starbluesolutions.net/engram:{{ build_number | default('latest') }}
      changed_when: true

    - name: Tag image as latest in registry
      ansible.builtin.command:
        cmd: >
          podman tag
          localhost/engram:latest
          registry.starbluesolutions.net/engram:latest
      changed_when: true

    - name: Push build tag to registry
      ansible.builtin.command:
        cmd: podman push registry.starbluesolutions.net/engram:{{ build_number | default('latest') }}
      changed_when: true

    - name: Push latest tag to registry
      ansible.builtin.command:
        cmd: podman push registry.starbluesolutions.net/engram:latest
      changed_when: true

    - name: Copy engram.container quadlet file
      ansible.builtin.copy:
        src: "{{ engram_src_dir }}/deploy/engram.container"
        dest: "{{ quadlet_dir }}/engram.container"
        remote_src: true
        mode: "0644"
      notify: Reload and restart engram

    - name: Ensure backup script directory exists
      ansible.builtin.file:
        path: /opt/engram/scripts
        state: directory
        owner: eddie
        group: eddie
        mode: "0755"
      become: true

    - name: Deploy backup script
      ansible.builtin.copy:
        src: "{{ engram_src_dir }}/deploy/scripts/backup-db.sh"
        dest: /opt/engram/scripts/backup-db.sh
        remote_src: true
        owner: eddie
        group: eddie
        mode: "0755"
      become: true

  handlers:
    - name: Reload user systemd daemon
      ansible.builtin.command:
        cmd: systemctl --user daemon-reload
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      listen: Reload and restart engram

    - name: Restart engram service
      ansible.builtin.command:
        cmd: systemctl --user restart engram
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      changed_when: true
      listen: Reload and restart engram
